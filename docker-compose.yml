version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: apt_backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DB_HOST=103.40.118.129
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=LEpooh2901#
      - DB_NAME=apartment_db
      - DB_SSL=false
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key_change_in_production_min_32chars}
      - JWT_EXPIRES_IN=7d
      - PORT=5000
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5000/api
    container_name: apt_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
